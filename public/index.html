<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xprtcommunity - Keyboard Battle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background elements -->
    <div class="sky"></div>
    <div class="ground"></div>

    <div id="app">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen active">
            <div class="glass-panel main-menu-panel">
                <h1 class="glitch" data-text="xprtcommunity">xprtcommunity</h1>
                <p class="subtitle">Multiplayer Keyboard Battle</p>
                
                <div class="menu-actions">
                    <input type="text" id="input-player-name" placeholder="Enter Your Name" maxlength="15" style="margin-bottom: 15px; width: 100%;">
                    
                    <select id="difficulty-select" style="width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0, 0, 0, 0.5); border: 2px solid var(--primary); color: white; border-radius: 8px; font-size: 1.1rem; outline: none; cursor: pointer;">
                        <option value="easy">Easy (Lowercase Words)</option>
                        <option value="hard">Hard (Mixed Case & Long)</option>
                        <option value="impossible">Impossible (Complex Phrases)</option>
                    </select>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <button id="btn-create" class="btn primary" style="flex: 1;">Create Room</button>
                        <button id="btn-computer" class="btn primary" style="flex: 1; background: #8b5cf6;">Vs Computer</button>
                    </div>

                    <div class="divider">OR</div>
                    <div class="join-section">
                        <input type="text" id="input-room-code" placeholder="Enter Code" maxlength="6">
                        <button id="btn-join" class="btn secondary">Play</button>
                    </div>
                </div>
                <div id="menu-message" class="message"></div>
            </div>
        </div>

        <!-- Waiting Room -->
        <div id="waiting-screen" class="screen">
            <div class="glass-panel">
                <h2>Room Created!</h2>
                <p>Share this code with your opponent:</p>
                <div class="room-code-display" id="display-room-code">------</div>
                <p class="pulse-text">Waiting for opponent to join...</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Countdown Overlay -->
            <div id="countdown-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 8rem; color: var(--primary); font-family: 'Courier New', Courier, monospace; font-weight: bold; text-shadow: 0 0 30px var(--primary); pointer-events: none; opacity: 0; transition: opacity 0.3s;">
                3
            </div>

            <div class="game-header" style="background: rgba(0, 0, 0, 0.85); z-index: 10; padding-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
                <div class="player-info left" id="p1-info">
                    <span class="player-label" id="p1-label">Player 1</span>
                    <div class="health-bar-container">
                        <div class="health-bar" id="p1-health" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="vs">VS</div>
                <div class="player-info right" id="p2-info">
                    <span class="player-label" id="p2-label">Player 2</span>
                    <div class="health-bar-container">
                        <div class="health-bar" id="p2-health" style="width: 100%;"></div>
                    </div>
                </div>
            </div>

            <div class="battlefield">
                <!-- Combo Counter -->
                <div id="combo-counter" style="position: absolute; top: 10%; left: 50%; transform: translateX(-50%) scale(0); font-size: 3rem; font-weight: 900; color: #fbbf24; text-shadow: 0 0 20px #fbbf24, 0 0 40px #f59e0b; opacity: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 15;">
                    2x COMBO!
                </div>

                <div class="combat-text" id="combat-feedback">FIGHT!</div>

                <div class="stickman" id="stickman-p1">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="left-arm arm"></div>
                    <div class="right-arm arm"></div>
                    <div class="left-leg leg"></div>
                    <div class="right-leg leg"></div>
                </div>
                
                <div class="stickman right" id="stickman-p2">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="left-arm arm"></div>
                    <div class="right-arm arm"></div>
                    <div class="left-leg leg"></div>
                    <div class="right-leg leg"></div>
                </div>
            </div>

            <div class="typing-interface">
                <div class="typing-area">
                    <div class="word-display-container">
                        <div class="word-display">
                            <span id="typed-part" class="typed"></span><span id="remaining-part" class="remaining">Wait...</span>
                            <span id="next-word" class="next-word" style="color: #64748b; margin-left: 20px; filter: blur(1px);"></span>
                        </div>
                    </div>
                    <input type="text" id="typing-input" autocomplete="off" spellcheck="false" placeholder="Type here..." disabled>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen">
            <div class="glass-panel">
                <h1 id="gameover-title">Game Over</h1>
                <p id="gameover-message"></p>
                <div class="stats-box" style="margin: 20px 0; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">
                    <h3 style="margin-bottom: 10px; color: var(--primary);">Your Stats</h3>
                    <p id="stat-wpm">Speed: 0 WPM</p>
                    <p id="stat-accuracy">Accuracy: 0%</p>
                </div>
                <button id="btn-menu" class="btn primary">Back to Menu</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
