<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xprtcommunity - Keyboard Battle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background elements -->
    <div class="sky"></div>
    <div class="ground"></div>

    <div id="app">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen active">
            <div class="glass-panel main-menu-panel">
                <h1 class="glitch" data-text="xprtcommunity">xprtcommunity</h1>
                <p class="subtitle">Multiplayer Keyboard Battle</p>
                
                <div class="menu-actions">
                    <input type="text" id="input-player-name" placeholder="Enter Your Name" maxlength="15" style="margin-bottom: 15px; width: 100%;">
                    <button id="btn-create" class="btn primary">Get Code</button>
                    <div class="divider">OR</div>
                    <div class="join-section">
                        <input type="text" id="input-room-code" placeholder="Enter Code" maxlength="6">
                        <button id="btn-join" class="btn secondary">Play</button>
                    </div>
                </div>
                <div id="menu-message" class="message"></div>
            </div>
        </div>

        <!-- Waiting Room -->
        <div id="waiting-screen" class="screen">
            <div class="glass-panel">
                <h2>Room Created!</h2>
                <p>Share this code with your opponent:</p>
                <div class="room-code-display" id="display-room-code">------</div>
                <p class="pulse-text">Waiting for opponent to join...</p>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="player-info" id="p1-info">
                    <span class="player-label" id="p1-label">Player 1</span>
                    <div class="health-bar-container">
                        <div class="health-bar" id="p1-health" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="vs">VS</div>
                <div class="player-info right" id="p2-info">
                    <span class="player-label" id="p2-label">Player 2</span>
                    <div class="health-bar-container">
                        <div class="health-bar" id="p2-health" style="width: 100%;"></div>
                    </div>
                </div>
            </div>

            <div class="battlefield">
                <div class="stickman" id="stickman-p1">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="left-arm arm"></div>
                    <div class="right-arm arm"></div>
                    <div class="left-leg leg"></div>
                    <div class="right-leg leg"></div>
                </div>
                
                <div class="combat-text" id="combat-feedback">FIGHT!</div>

                <div class="stickman right" id="stickman-p2">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="left-arm arm"></div>
                    <div class="right-arm arm"></div>
                    <div class="left-leg leg"></div>
                    <div class="right-leg leg"></div>
                </div>
            </div>

            <div class="typing-area">
                <div class="word-display-container">
                    <div class="word-display">
                        <span id="typed-part" class="typed"></span><span id="remaining-part" class="remaining">Wait...</span>
                    </div>
                </div>
                <input type="text" id="typing-input" autocomplete="off" spellcheck="false" placeholder="Type here..." disabled>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen">
            <div class="glass-panel">
                <h1 id="gameover-title">Game Over</h1>
                <p id="gameover-message"></p>
                <div class="stats-box" style="margin: 20px 0; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">
                    <h3 style="margin-bottom: 10px; color: var(--primary);">Your Stats</h3>
                    <p id="stat-wpm">Speed: 0 WPM</p>
                    <p id="stat-accuracy">Accuracy: 0%</p>
                </div>
                <button id="btn-menu" class="btn primary">Back to Menu</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
